<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍸</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>调酒配方大全</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #c0392b;
        --primary-dark: #a93226;
        --primary-light: #e74c3c;
        --accent: #f39c12;
        --accent-light: #f5b041;
        --bg: #fdf6ee;
        --bg-card: #ffffff;
        --text: #2c2c2c;
        --text-light: #666666;
        --text-muted: #999999;
        --border: #e8e0d8;
        --shadow: 0 2px 12px rgba(0,0,0,0.08);
        --shadow-hover: 0 6px 24px rgba(0,0,0,0.14);
        --radius: 12px;
        --radius-sm: 8px;
        --transition: 0.25s ease;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ===== Header ===== */
      .app-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        color: white;
        padding: 0;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 16px rgba(192, 57, 43, 0.3);
      }

      .header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        user-select: none;
      }

      .logo-icon {
        font-size: 28px;
      }

      .nav-links {
        display: flex;
        gap: 6px;
      }

      .nav-btn {
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.25);
        color: white;
        padding: 7px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .nav-btn:hover, .nav-btn.active {
        background: rgba(255,255,255,0.3);
      }

      .nav-btn .badge {
        background: var(--accent);
        color: white;
        font-size: 11px;
        min-width: 18px;
        height: 18px;
        border-radius: 9px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 4px;
      }

      /* ===== Search & Filter Bar ===== */
      .toolbar {
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px 20px;
        width: 100%;
      }

      .search-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
      }

      .search-input {
        flex: 1;
        padding: 10px 16px;
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 15px;
        background: var(--bg-card);
        transition: var(--transition);
        outline: none;
        color: var(--text);
      }

      .search-input:focus {
        border-color: var(--primary-light);
        box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.12);
      }

      .search-input::placeholder {
        color: var(--text-muted);
      }

      .filter-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .filter-label {
        font-size: 13px;
        color: var(--text-light);
        font-weight: 600;
        margin-right: 4px;
      }

      .filter-chip {
        padding: 5px 14px;
        border: 1.5px solid var(--border);
        border-radius: 16px;
        font-size: 13px;
        cursor: pointer;
        transition: var(--transition);
        background: var(--bg-card);
        color: var(--text-light);
        user-select: none;
      }

      .filter-chip:hover {
        border-color: var(--primary-light);
        color: var(--primary);
      }

      .filter-chip.active {
        background: var(--primary);
        border-color: var(--primary);
        color: white;
      }

      /* ===== Card Grid ===== */
      .main-content {
        flex: 1;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px 40px;
        width: 100%;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }

      .cocktail-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        cursor: pointer;
        transition: var(--transition);
        border: 1px solid transparent;
      }

      .cocktail-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-hover);
        border-color: var(--primary-light);
      }

      .card-color-strip {
        height: 6px;
      }

      .card-body {
        padding: 18px;
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 10px;
      }

      .card-name {
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
      }

      .card-name-en {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .fav-btn {
        background: none;
        border: none;
        font-size: 22px;
        cursor: pointer;
        padding: 0;
        line-height: 1;
        transition: var(--transition);
      }

      .fav-btn:hover {
        transform: scale(1.2);
      }

      .card-meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 12px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
      }

      .tag-spirit {
        background: #fef3e2;
        color: #b7791f;
        border: 1px solid #fcd88d;
      }

      .tag-alc {
        background: #e8f5e9;
        color: #2e7d32;
        border: 1px solid #a5d6a7;
      }

      .difficulty-stars {
        color: var(--accent);
        font-size: 14px;
        letter-spacing: 1px;
      }

      .card-flavor {
        font-size: 13px;
        color: var(--text-light);
        margin-top: 10px;
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ===== Detail Page ===== */
      .detail-page {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px 20px 60px;
        width: 100%;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--primary);
        font-size: 15px;
        cursor: pointer;
        padding: 8px 0;
        margin-bottom: 10px;
        background: none;
        border: none;
        font-weight: 600;
        transition: var(--transition);
      }

      .back-btn:hover {
        color: var(--primary-dark);
      }

      .detail-hero {
        background: var(--bg-card);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }

      .detail-color-strip {
        height: 10px;
      }

      .detail-hero-body {
        padding: 28px;
      }

      .detail-title {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 4px;
      }

      .detail-title-en {
        font-size: 15px;
        color: var(--text-muted);
        margin-bottom: 16px;
      }

      .detail-tags {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .detail-tags .tag {
        font-size: 13px;
        padding: 5px 14px;
      }

      .detail-desc {
        font-size: 15px;
        color: var(--text-light);
        line-height: 1.8;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
      }

      .detail-fav-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 24px;
        border: 2px solid var(--primary);
        border-radius: 24px;
        background: white;
        color: var(--primary);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
      }

      .detail-fav-btn:hover, .detail-fav-btn.faved {
        background: var(--primary);
        color: white;
      }

      .detail-section {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 24px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
      }

      .section-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .section-title .icon {
        font-size: 20px;
      }

      .ingredient-list {
        list-style: none;
      }

      .ingredient-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px dashed var(--border);
        font-size: 15px;
      }

      .ingredient-item:last-child {
        border-bottom: none;
      }

      .ingredient-name {
        color: var(--text);
        font-weight: 500;
      }

      .ingredient-amount {
        color: var(--primary);
        font-weight: 600;
        white-space: nowrap;
      }

      .step-list {
        list-style: none;
        counter-reset: step-counter;
      }

      .step-item {
        counter-increment: step-counter;
        display: flex;
        gap: 14px;
        padding: 14px 0;
        border-bottom: 1px dashed var(--border);
        align-items: flex-start;
      }

      .step-item:last-child {
        border-bottom: none;
      }

      .step-number {
        width: 30px;
        height: 30px;
        background: var(--primary);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        flex-shrink: 0;
        margin-top: 1px;
      }

      .step-text {
        font-size: 15px;
        color: var(--text);
        line-height: 1.7;
        padding-top: 4px;
      }

      .tip-box {
        background: #fef9e7;
        border: 1px solid #f9e79f;
        border-radius: var(--radius-sm);
        padding: 16px;
        font-size: 14px;
        color: #6e5b00;
        line-height: 1.8;
      }

      .tip-box::before {
        content: '';
      }

      /* ===== Favorites Page ===== */
      .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: var(--text-muted);
      }

      .empty-state .icon {
        font-size: 64px;
        margin-bottom: 16px;
        display: block;
      }

      .empty-state h3 {
        font-size: 20px;
        margin-bottom: 8px;
        color: var(--text-light);
      }

      .empty-state p {
        font-size: 15px;
      }

      .fav-remove-btn {
        background: none;
        border: 1px solid #e74c3c;
        color: #e74c3c;
        padding: 4px 12px;
        border-radius: 14px;
        font-size: 12px;
        cursor: pointer;
        transition: var(--transition);
      }

      .fav-remove-btn:hover {
        background: #e74c3c;
        color: white;
      }

      /* ===== Results count ===== */
      .results-info {
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .results-count {
        font-weight: 700;
        color: var(--primary);
      }

      /* ===== Responsive ===== */
      @media (max-width: 600px) {
        .logo {
          font-size: 18px;
        }

        .logo-icon {
          font-size: 22px;
        }

        .nav-btn {
          padding: 6px 10px;
          font-size: 13px;
        }

        .card-grid {
          grid-template-columns: 1fr;
        }

        .detail-title {
          font-size: 22px;
        }

        .search-bar {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
